    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root { color-scheme: dark; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0a0a0b;
        }

        .font-display { font-family: 'Big Shoulders Display', 'Plus Jakarta Sans', sans-serif; }

        .ambient-glow {
            position: fixed;
            top: 38%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1100px;
            height: 1100px;
            z-index: 0;
            pointer-events: none;
            transition: background 1s ease;
        }

        .glow-default  { background: radial-gradient(circle, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0) 60%); }
        .glow-yes      { background: radial-gradient(circle, rgba(255,59,48,0.10) 0%, rgba(0,0,0,0) 60%); }
        .glow-no       { background: radial-gradient(circle, rgba(48,209,88,0.08) 0%, rgba(0,0,0,0) 60%); }
        .glow-absent   { background: radial-gradient(circle, rgba(255,159,10,0.07) 0%, rgba(0,0,0,0) 60%); }

        .search-shell {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        .search-shell:focus-within {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.14);
        }
        input:focus { outline: none; }

        .verdict-word {
            font-family: 'Big Shoulders Display', sans-serif;
            font-weight: 800;
            letter-spacing: -0.01em;
            line-height: 0.9;
            animation: verdictRise 0.45s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .verdict-yes    { color: #ff453a; }
        .verdict-no     { color: #32d74b; }
        .verdict-absent { color: #ff9f0a; }

        @keyframes verdictRise {
            0%   { transform: translateY(8px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .fade-slide {
            transition: opacity 0.5s cubic-bezier(0.16,1,0.3,1), transform 0.5s cubic-bezier(0.16,1,0.3,1);
        }
    </style>
</head>
<body id="app-wrapper" class="text-zinc-100 min-h-screen flex flex-col items-center justify-center selection:bg-red-500/20 relative px-6">

    <div id="glow-field" class="ambient-glow glow-default"></div>

    <main class="w-full max-w-lg z-10 -mt-8">

        <div class="text-center mb-9">
            <h1 class="font-display text-5xl sm:text-6xl font-bold tracking-tight mb-3 text-white uppercase">
                The Streets Never Forget.
            </h1>
            <p class="text-zinc-500 text-base">
                How did your MP vote on the Finance Bill?
            </p>
        </div>

        <div class="search-shell rounded-full flex items-center gap-3 px-5 py-4 mb-8">
            <svg class="w-4 h-4 text-zinc-500 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <circle cx="11" cy="11" r="7"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input
                type="text"
                id="search-input"
                autocomplete="off"
                spellcheck="false"
                placeholder="Search a name, constituency or county"
                class="w-full bg-transparent text-white placeholder-zinc-500 text-base sm:text-lg font-medium border-0"
            >
        </div>

        <!-- Idle state -->
        <div id="idle-state" class="text-center fade-slide opacity-100">
            <p id="idle-tally" class="text-zinc-600 text-sm"></p>
        </div>

        <!-- Hero verdict (always exactly one match shown) -->
        <div id="hero-panel" class="text-center fade-slide opacity-0 translate-y-4 pointer-events-none hidden">
            <h2 id="vote-decision" class="verdict-word text-7xl sm:text-8xl uppercase mb-5"></h2>

            <p id="mp-name" class="text-2xl sm:text-3xl font-bold tracking-tight text-white"></p>
            <p id="mp-location" class="text-sm text-zinc-500 mt-1"></p>
            <p id="mp-subtext" class="text-sm text-zinc-500 mt-5 max-w-sm mx-auto"></p>
            <p id="mp-context" class="text-xs text-zinc-600 mt-4"></p>
        </div>

        <!-- No matches -->
        <div id="empty-state" class="text-center fade-slide opacity-0 translate-y-4 pointer-events-none hidden">
            <p class="text-zinc-500 text-base">No record matches that.</p>
        </div>

    </main>

            { name: "Talib Abubakar Ahmed", constituency: "Nominated", county: "National Assembly", vote: "YES" }

        // ---- Query intelligence: vote-intent + county detection + fuzzy fallback ----

        const VOTE_PATTERNS = [
            { value: "ABSENT", regex: /\babsent(ee)?\b|\bmissing\b|\bskip(ped)?\b|\bno[- ]?show\b|\bdidn'?t\s+vote\b/i },
            { value: "YES",    regex: /\byes\b|\bsupport(ed|ers?)?\b|\bpro[- ]?bill\b/i },
            { value: "NO",     regex: /\bno\b|\bagainst\b|\boppos(e|ed|ition)\b|\breject(ed)?\b/i }
        ];

        const KNOWN_COUNTIES = [...new Set(parliamentaryRecords.map(r => r.county))]
            .sort((a, b) => b.length - a.length); // longest-first so "Uasin Gishu" wins over any partial overlap

        const STOPWORDS = /\b(who|voted|voting|votes|vote|mp|mps|member|members|in|on|at|the|for|of|show|list|find|search|did|does|is|are|from|county|constituency)\b/gi;

        function parseQuery(raw) {
            const lower = raw.toLowerCase();
            let vote = null;
            for (const p of VOTE_PATTERNS) {
                if (p.regex.test(lower)) { vote = p.value; break; }
            }

            let county = null;
            for (const c of KNOWN_COUNTIES) {
                if (lower.includes(c.toLowerCase())) { county = c; break; }
            }

            let remainder = lower;
            if (vote) remainder = remainder.replace(VOTE_PATTERNS.find(p => p.value === vote).regex, " ");
            if (county) remainder = remainder.replace(new RegExp(county.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "gi"), " ");
            remainder = remainder.replace(STOPWORDS, " ").replace(/\s+/g, " ").trim();

            return { vote, county, remainder };
        }

        const fuse = new Fuse(parliamentaryRecords, {
            keys: [
                { name: "name", weight: 0.5 },
                { name: "constituency", weight: 0.3 },
                { name: "county", weight: 0.2 }
            ],
            threshold: 0.36,
            ignoreLocation: true,
            includeScore: true
        });

        // ---- DOM refs ----
        const searchInput   = document.getElementById('search-input');
        const appWrapper    = document.getElementById('app-wrapper');
        const glowField     = document.getElementById('glow-field');
        const idleTally      = document.getElementById('idle-tally');

        const idleState      = document.getElementById('idle-state');
        const heroPanel       = document.getElementById('hero-panel');
        const emptyState      = document.getElementById('empty-state');

        const voteDecision = document.getElementById('vote-decision');
        const mpName        = document.getElementById('mp-name');
        const mpLocation    = document.getElementById('mp-location');
        const mpSubtext     = document.getElementById('mp-subtext');
        const mpContext     = document.getElementById('mp-context');

        (function renderIdleTally() {
            const counts = parliamentaryRecords.reduce((acc, r) => { acc[r.vote] = (acc[r.vote] || 0) + 1; return acc; }, {});
            idleTally.textContent = `${parliamentaryRecords.length} MPs · ${counts.YES || 0} voted yes`;
        })();

        function showOnly(panel) {
            [idleState, heroPanel, emptyState].forEach(p => {
                const isTarget = p === panel;
                p.classList.toggle('opacity-0', !isTarget);
                p.classList.toggle('translate-y-4', !isTarget);
                p.classList.toggle('pointer-events-none', !isTarget);
                p.classList.toggle('hidden', !isTarget);
            });
        }

        function renderHero(record, contextLabel) {
            mpName.textContent = record.name;
            mpLocation.textContent = `${record.constituency} — ${record.county}`;
            mpContext.textContent = contextLabel || "";

            if (record.vote === "YES") {
                voteDecision.textContent = "Voted Yes";
                voteDecision.className = "verdict-word verdict-yes text-7xl sm:text-8xl uppercase mb-5";
                mpSubtext.textContent = "This MP voted in favor of the Finance Bill.";
                glowField.className = "ambient-glow glow-yes";

            } else if (record.vote === "NO") {
                voteDecision.textContent = "Voted No";
                voteDecision.className = "verdict-word verdict-no text-7xl sm:text-8xl uppercase mb-5";
                mpSubtext.textContent = "This MP voted against the Finance Bill.";
                glowField.className = "ambient-glow glow-no";

            } else {
                voteDecision.textContent = "Absent";
                voteDecision.className = "verdict-word verdict-absent text-7xl sm:text-8xl uppercase mb-5";
                mpSubtext.textContent = "This MP was not recorded present for the division.";
                glowField.className = "ambient-glow glow-absent";
            }

            showOnly(heroPanel);
        }

        function resetToIdle() {
            glowField.className = "ambient-glow glow-default";
            showOnly(idleState);
        }

        // Resolves every query to exactly one record — no list UI. Plain-language
        // vote/county filters narrow a pool, then the first (alphabetical-by-
        // constituency) record in that pool is shown as the single answer.
        searchInput.addEventListener('input', (e) => {
            const raw = e.target.value.trim();

            if (raw === "") { resetToIdle(); return; }

            const { vote, county, remainder } = parseQuery(raw);
            let best;
            let context = "";

            if (vote || county) {
                let pool = parliamentaryRecords.filter(r =>
                    (!vote || r.vote === vote) &&
                    (!county || r.county.toLowerCase() === county.toLowerCase())
                );
                if (remainder.length >= 2) {
                    pool = pool.filter(r =>
                        r.name.toLowerCase().includes(remainder) ||
                        r.constituency.toLowerCase().includes(remainder)
                    );
                }
                pool = [...pool].sort((a, b) => a.constituency.localeCompare(b.constituency));
                best = pool[0];

                if (best && pool.length > 1) {
                    const parts = [];
                    if (vote) parts.push(`${vote} votes`);
                    if (county) parts.push(county);
                    context = `1 of ${pool.length} — ${parts.join(' in ')}`;
                }
            } else {
                const results = fuse.search(raw);
                best = results[0] && results[0].item;
            }

            if (!best) { showOnly(emptyState); return; }
            renderHero(best, context);
        });
